<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Print Guy</title>
<style> 
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#eaf4ff,#d6ebff,#c8e3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.92);
    border-radius:30px;
    padding:35px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.18);
}

.logo img{
    width:380px;
    max-width:100%;
    margin-bottom:20px;
}

.tagline{
    color:#555;
    font-size:16px;
    margin-bottom:30px;
    line-height:1.5;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    font-size:17px;
    padding:16px;
    border-radius:50px;
    margin:14px 0;
    transition:all .3s ease;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(0,0,0,.2);
}

.whatsapp{background:#25D366;}
.instagram{
    background:linear-gradient(45deg,#833AB4,#FD1D1D,#FCAF45);
}
.facebook{background:#1877F2;}
.tiktok{background:#111;}
.website{background:#555;}
.review{background:#F4B400;}

.footer{
    margin-top:30px;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="logo">
    <img src="logo.png" alt="The Print Guy Logo">
</div>

<p class="tagline">
Premium Printing • Branding • Large Format Printing<br>
Everything you need is just one tap away.
</p>

<a class="btn whatsapp" href="#">
📱 Chat on WhatsApp
</a>

<a class="btn instagram" href="#">
📸 Follow on Instagram
</a>

<a class="btn facebook" href="#">
👍 Follow on Facebook
</a>

<a class="btn tiktok" href="#">
🎵 Watch on TikTok
</a>

<a class="btn website" href="#">
🌐 Visit Our Website
</a>

<a class="btn review" href="#">
⭐ Leave a Google Review
</a>
<div class="footer">
    Powered by <strong>The Print Guy</strong><br>
    Lagos, Nigeria
</div>

</html>
