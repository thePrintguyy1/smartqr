<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Print Guy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#eef5ff,#d8ebff,#c7e2ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#ffffff;
    border-radius:28px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.logo img{
    width:280px;
    max-width:100%;
    height:auto;
    margin-bottom:20px;
}

.tagline{
    color:#666;
    font-size:15px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
    font-size:17px;
    font-weight:bold;
    padding:16px;
    margin:14px 0;
    border-radius:50px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.whatsapp{
    background:#25D366;
}

.instagram{
    background:linear-gradient(45deg,#833AB4,#FD1D1D,#FCAF45);
}

.facebook{
    background:#1877F2;
}

.tiktok{
    background:#111;
}

.website{
    background:#555;
}

.review{
    background:#f4b400;
}

.footer{
    margin-top:30px;
    color:#777;
    font-size:13px;
}

.footer strong{
    color:#111;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png" alt="The Print Guy Logo">
</div>

<p class="tagline">
Premium Printing • Branding • Packaging • Large Format Printing
<br><br>
Everything you need is just one tap away.
</p>

<a class="btn whatsapp" href="https://wa.me/234XXXXXXXXXX">
📱 Chat on WhatsApp
</a>

<a class="btn instagram" href="https://instagram.com//print__guy/">
📸 Follow on Instagram
</a>

<a class="btn facebook" href="https://facebook.com/YOURPAGE">
👍 Follow on Facebook
</a>

<a class="btn tiktok" href="https://tiktok.com/@YOURUSERNAME">
🎵 Watch on TikTok
</a>

<a class="btn website" href="https://YOURWEBSITE.COM">
🌐 Visit Our Website
</a>

<a class="btn review" href="YOUR_GOOGLE_REVIEW_LINK">
⭐ Leave a Google Review
</a>

<div class="footer">
Powered by <strong>The Print Guy™</strong><br>
Lagos, Nigeria
</div>

</div>

</body>
</html>
